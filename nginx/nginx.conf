# Reverse proxy for Synapse (TLS can be added per DEPLOYMENT.md).
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    upstream synapse_api {
        server synapse-api:8000;
    }

    upstream synapse_frontend {
        server synapse-frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        include /etc/nginx/snippets/security-headers.conf;

        location /api/ {
            proxy_pass         http://synapse_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass         http://synapse_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # Port 443 reserved for TLS termination once certificates exist under nginx/ssl/
    # (see docs/DEPLOYMENT.md). Uncomment when cert.pem / key.pem are available.
    #
    # server {
    #     listen 443 ssl;
    #     ssl_certificate     /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ...
    # }
}
