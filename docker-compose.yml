# Synapse — shared base stack (extended by docker-compose.dev.yml or
# docker-compose.prod.yml). Matches Section 15 minus nginx, restart policies,
# and Ollama GPU reservation (those come from docker-compose.prod.yml).

# Fix model_cache volume permissions without rebuilding images (runs as root, drops to synapse).
x-backend-init: &backend-init
  user: "0:0"
  entrypoint: ["/bin/sh", "-ec"]

services:
  synapse-api:
    <<: *backend-init
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    command:
      - |
        mkdir -p /app/.cache/huggingface/hub /app/.cache/sentence_transformers
        chown -R 1001:1001 /app/.cache
        exec runuser -u synapse -- /opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --log-level debug
    volumes:
      - model_cache:/app/.cache
      - ./backend/app:/app/app
    environment:
      - HF_HOME=/app/.cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/app/.cache/huggingface/hub
      - TRANSFORMERS_CACHE=/app/.cache/huggingface/hub
      - SENTENCE_TRANSFORMERS_HOME=/app/.cache/sentence_transformers
      - HOME=/app
      - POSTGRES_HOST=postgres
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - SECRET_KEY=dev-secret-key-change-in-prod-32chars-ok
      - POSTGRES_PASSWORD=synapse_dev_pass
      - NEO4J_PASSWORD=synapse_dev_pass
      - FERNET_KEY=ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      - DATABASE_URL=postgresql+psycopg://synapse:synapse_dev_pass@postgres:5432/synapse
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  synapse-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://synapse-api:8000
    depends_on:
      - synapse-api

  synapse-worker:
    <<: *backend-init
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file: .env
    volumes:
      - model_cache:/app/.cache
    environment:
      - HF_HOME=/app/.cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/app/.cache/huggingface/hub
      - TRANSFORMERS_CACHE=/app/.cache/huggingface/hub
      - SENTENCE_TRANSFORMERS_HOME=/app/.cache/sentence_transformers
      - HOME=/app
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - SECRET_KEY=dev-secret-key-change-in-prod-32chars-ok
      - POSTGRES_PASSWORD=synapse_dev_pass
      - NEO4J_PASSWORD=synapse_dev_pass
      - FERNET_KEY=ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      - DATABASE_URL=postgresql+psycopg://synapse:synapse_dev_pass@postgres:5432/synapse
    command:
      - |
        mkdir -p /app/.cache/huggingface/hub /app/.cache/sentence_transformers
        chown -R 1001:1001 /app/.cache
        exec runuser -u synapse -- celery -A app.workers.celery_app worker -l info -c 4
    depends_on:
      - redis
      - postgres
      - neo4j

  synapse-beat:
    <<: *backend-init
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file: .env
    volumes:
      - model_cache:/app/.cache
    environment:
      - HF_HOME=/app/.cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/app/.cache/huggingface/hub
      - TRANSFORMERS_CACHE=/app/.cache/huggingface/hub
      - SENTENCE_TRANSFORMERS_HOME=/app/.cache/sentence_transformers
      - HOME=/app
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - SECRET_KEY=dev-secret-key-change-in-prod-32chars-ok
      - POSTGRES_PASSWORD=synapse_dev_pass
      - NEO4J_PASSWORD=synapse_dev_pass
      - FERNET_KEY=ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      - DATABASE_URL=postgresql+psycopg://synapse:synapse_dev_pass@postgres:5432/synapse
    command:
      - |
        mkdir -p /app/.cache/huggingface/hub /app/.cache/sentence_transformers
        chown -R 1001:1001 /app/.cache
        exec runuser -u synapse -- celery -A app.workers.celery_app beat -l info
    depends_on:
      - redis

  neo4j:
    image: neo4j:5.25-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s

  

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: synapse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 5s

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  flower:
    <<: *backend-init
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    volumes:
      - model_cache:/app/.cache
    environment:
      - HF_HOME=/app/.cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/app/.cache/huggingface/hub
      - TRANSFORMERS_CACHE=/app/.cache/huggingface/hub
      - SENTENCE_TRANSFORMERS_HOME=/app/.cache/sentence_transformers
      - HOME=/app
    command:
      - |
        mkdir -p /app/.cache/huggingface/hub /app/.cache/sentence_transformers
        chown -R 1001:1001 /app/.cache
        exec runuser -u synapse -- celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  model_cache:
  neo4j_data:
  postgres_data:
  redis_data:
  ollama_data: