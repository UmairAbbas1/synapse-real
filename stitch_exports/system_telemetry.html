<style>
  body {
    background-color: #faf8ff;
  }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface-container-lowest dark:bg-on-background fixed top-0 left-0 w-full z-40 flex justify-between items-center px-margin-desktop h-16 border-b border-outline-variant dark:border-outline shadow-sm">
<button class="text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-low dark:hover:bg-surface-variant transition-colors active:opacity-70 flex items-center justify-center p-sm rounded-full">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<div class="font-headline-lg text-headline-lg tracking-tight font-semibold text-on-surface dark:text-surface-bright flex-1 text-center">
      Synapse
    </div>
<button class="hover:bg-surface-container-low dark:hover:bg-surface-variant transition-colors active:opacity-70 flex items-center justify-center rounded-full overflow-hidden w-[32px] h-[32px] border border-outline-variant">
<img alt="User Profile Avatar" class="w-full h-full object-cover" data-alt="A close-up, highly detailed portrait of a professional individual in a well-lit, minimalist corporate setting. The lighting is soft and neutral, typical of a modern light-mode interface profile picture. The background is slightly blurred to keep the focus sharp on the subject, exuding a tone of precision and reliability consistent with an enterprise software environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_U_Ajd0MJ3X1Xp2-4HoNNXje0FlaCjLY4P9OwpaDTl9DbR3cfURrsU4aPd3b_qPn9j6lZTpOVtDwDP0FcYNozjzE-44lFDw5gwYVCLmJAx7wcOFVGjeKEQSZWwGBx9GC0VHn_EpGxxz7nExzuWlH9OxmoJdvrjlmf8CiqnCrTuU44zUvBcfBQtVHGlv9ptx7vD3zWKKpIllvu3GSqJvildhHHKHiSbuV25cbTiWRUhM6LDQCyuLAEAQRMjX321lnVdexenchyZpI"/>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-1 w-full max-w-[640px] mx-auto pt-[80px] pb-[96px] px-margin-mobile flex flex-col gap-lg">
<!-- Page Header -->
<div class="flex flex-col gap-xs">
<h1 class="font-headline-md text-headline-md text-on-surface font-semibold">System Telemetry</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Live cluster health &amp; vector operations</p>
</div>
<!-- Metrics Bento Grid -->
<div class="grid grid-cols-2 gap-md">
<!-- Metric 1 -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-md shadow-sm flex flex-col justify-between gap-base h-[100px]">
<div class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]" data-icon="database" style="font-variation-settings: 'FILL' 0;">database</span>
          Total Embeddings
        </div>
<div class="font-headline-lg text-headline-lg font-semibold text-on-surface">
          4.2M
        </div>
</div>
<!-- Metric 2 -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-md shadow-sm flex flex-col justify-between gap-base h-[100px]">
<div class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]" data-icon="health_and_safety" style="font-variation-settings: 'FILL' 0;">health_and_safety</span>
          Vector DB Health
        </div>
<div class="font-mono-md text-mono-md text-[#15803d] flex items-center gap-xs font-medium">
<div class="w-2 h-2 rounded-full bg-[#15803d]"></div>
          Optimal
        </div>
</div>
<!-- Metric 3 -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-md shadow-sm flex flex-col justify-between gap-base h-[100px]">
<div class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]" data-icon="speed" style="font-variation-settings: 'FILL' 0;">speed</span>
          Query Latency p99
        </div>
<div class="font-mono-md text-mono-md text-on-surface font-medium">
          1.2s
        </div>
</div>
<!-- Metric 4 -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-md shadow-sm flex flex-col justify-between gap-base h-[100px]">
<div class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]" data-icon="terminal" style="font-variation-settings: 'FILL' 0;">terminal</span>
          Active Operators
        </div>
<div class="font-mono-md text-mono-md text-on-surface font-medium">
          24
        </div>
</div>
</div>
<!-- Main Chart Panel -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-md shadow-sm flex flex-col gap-lg">
<div class="flex justify-between items-start">
<div class="flex flex-col gap-xs">
<h2 class="font-body-md text-body-md font-semibold text-on-surface">Graph Traversal vs Vector Search</h2>
<span class="font-label-sm text-label-sm text-on-surface-variant">Last 7 Days • Ops/sec</span>
</div>
<button class="p-xs text-on-surface-variant hover:bg-surface-container-low rounded-DEFAULT transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="more_vert">more_vert</span>
</button>
</div>
<!-- Chart Mockup -->
<div class="w-full h-[200px] relative mt-sm border-b border-l border-outline-variant/50 pb-sm pl-sm flex flex-col justify-between">
<!-- Y-Axis Labels -->
<div class="absolute left-[-28px] top-0 h-full flex flex-col justify-between font-label-sm text-label-sm text-on-surface-variant pr-xs items-end">
<span>5k</span>
<span>2.5k</span>
<span>0</span>
</div>
<!-- Grid Lines -->
<div class="absolute inset-0 flex flex-col justify-between pointer-events-none pl-sm pb-sm">
<div class="w-full border-t border-outline-variant/20"></div>
<div class="w-full border-t border-outline-variant/20"></div>
<div class="w-full border-t border-outline-variant/20"></div>
</div>
<!-- SVG Line Graph -->
<svg class="w-full h-full relative z-10" preserveaspectratio="none" viewbox="0 0 100 100">
<!-- Graph Traversal Line (Primary) -->
<polyline class="text-primary" fill="none" points="0,80 15,75 30,60 45,65 60,40 75,30 90,45 100,20" stroke="currentColor" stroke-width="1"></polyline>
<!-- Vector Search Line (Secondary) -->
<polyline class="text-secondary" fill="none" points="0,90 15,85 30,88 45,70 60,75 75,60 90,65 100,50" stroke="currentColor" stroke-dasharray="2 2" stroke-width="1"></polyline>
</svg>
<!-- Legend -->
<div class="absolute top-2 right-2 flex flex-col gap-xs bg-surface-container-lowest/80 p-xs border border-outline-variant/50 rounded-DEFAULT backdrop-blur-sm">
<div class="flex items-center gap-xs font-label-sm text-label-sm text-on-surface">
<div class="w-2 h-[1px] bg-primary"></div> Traversal
          </div>
<div class="flex items-center gap-xs font-label-sm text-label-sm text-on-surface">
<div class="w-2 h-[1px] bg-secondary border-t border-secondary border-dashed"></div> Vector
          </div>
</div>
</div>
<!-- X-Axis Labels -->
<div class="w-full flex justify-between font-label-sm text-label-sm text-on-surface-variant pl-sm pt-xs">
<span>Mon</span>
<span>Wed</span>
<span>Fri</span>
<span>Sun</span>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="bg-surface-container-lowest dark:bg-on-background fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-margin-mobile py-base md:hidden border-t border-outline-variant dark:border-outline shadow-sm">
<!-- Item 1: Inactive -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-variant/50 scale-95 active:scale-90 transition-transform p-sm rounded-xl gap-xs w-[64px]">
<span class="material-symbols-outlined text-[24px]" data-icon="search">search</span>
<span class="font-label-sm text-label-sm">Search</span>
</button>
<!-- Item 2: Active (Analytics matches Telemetry intent) -->
<button class="flex flex-col items-center justify-center bg-secondary-container dark:bg-on-secondary-fixed-variant text-on-secondary-container dark:text-secondary-fixed rounded-full px-4 py-1 hover:bg-surface-variant/50 scale-95 active:scale-90 transition-transform gap-xs min-w-[64px]">
<span class="material-symbols-outlined text-[24px]" data-icon="analytics" style="font-variation-settings: 'FILL' 1;">analytics</span>
<span class="font-label-sm text-label-sm">Analytics</span>
</button>
<!-- Item 3: Inactive -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-variant/50 scale-95 active:scale-90 transition-transform p-sm rounded-xl gap-xs w-[64px]">
<span class="material-symbols-outlined text-[24px]" data-icon="notifications">notifications</span>
<span class="font-label-sm text-label-sm">Notifications</span>
</button>
</nav>
</body></html>
